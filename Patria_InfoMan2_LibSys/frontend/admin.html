                            <path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.7 57355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill-rule="evenodd"></path>
                        </svg>

                    <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">NEU Library</h2>

            <main class="flex flex-1 justify-center py-10 px-4">
                <div class="layout-content-container flex flex-col max-w-[520px] flex-1">
                    <div class="@container mb-8">
                        <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[240px] shadow-lg border border-slate-200 dark:border-slate-800" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD_6bt_rLlgotQ9_5ys519FcfFfZ1oaW13ObW1Xy5sj2sGibmNcb2nyIlpLmMdjXMEP6eQfqLInyurrDmAouPvxSnzkP-b511B9IHJSgDJgYLTO2MKmO1-SfrW4NBAv_sf-82-USZXul_MtclXkCJUWuLhIHcJ-pR8VZQCbW8VGcuTirqkkFzpOzE82ZQaVYNlc-I1GFftlcNlSrIb3MB3rO-AP41Xa2o7LyDze4yjf_4InHTaK6Io7wFks4ii1JytE_zoOQiJCjgo");'>

                    <div class="flex flex-col gap-3 mb-8 px-2 text-center">

                        <p class="text-slate-600 dark:text-slate-400 text-base font-normal">Welcome, Administrator. Please select your preferred method to access library resources.</p>
                    </div>

                    <div class="flex flex-col gap-4">
                        <button onclick="handleGoogleLogin()" class="group flex items-center gap-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-xl hover:border-primary hover:ring-2 hover:ring-primary/20 transition-all text-left shadow-sm">

                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

                                </svg>

                                <p class="text-slate-500 dark:text-slate-400 text-sm">Sign in with your admin @neu.edu.ph account</p>
                            </div>

                        </button>
                    </div>

                    <div class="mt-12 text-center">
                        <p class="text-slate-500 dark:text-slate-400 text-sm">
                            Having trouble logging in? 
                            <a class="text-primary font-semibold hover:underline" href="#">Contact IT Support.</a>
                        </p>
                        <div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-center gap-6">

                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
    let tokenClient;

    window.onload = function () {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: '181340946221-etfandrfb2ao15fajcfcsd7j5ht72o51.apps.googleusercontent.com', 
            scope: 'email profile',
            hd: 'neu.edu.ph', 
            callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                    fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: {
                            'Authorization': `Bearer ${tokenResponse.access_token}`
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];
                        
                        if (data.email && blockedEmails.includes(data.email.toLowerCase())) {
                            alert("ACCESS DENIED: Your account has been blocked by the Library Administrator.");
                            return; 
                        }

                        localStorage.setItem('adminEmail', data.email);
                        localStorage.setItem('adminName', data.name);
 
                        const now = new Date();
                        const logData = {
                            name: data.name,
                            email: data.email,
                            loginDate: now.toLocaleDateString('en-CA'), 
                            loginTime: now.toLocaleTimeString('en-US', { hour12: false })
                        };

                        fetch('http://localhost:8080/api/admin-logs', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(logData)
                        })
                        .then(res => {
                            if (!res.ok) console.warn("Failed to save admin log to DB.");
                            window.location.href = 'adashboard.html';
                        })
                        .catch(err => {
                            console.error("Error saving admin log:", err);
                            window.location.href = 'adashboard.html';
                        });

                    })
                    .catch(error => {
                        console.error('Error fetching user info:', error);
                        window.location.href = 'adashboard.html';
                    });
                }
            },
        });
    };

    function handleGoogleLogin() {
        tokenClient.requestAccessToken();
    }
</script>
</body>
</html>
