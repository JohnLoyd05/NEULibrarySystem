<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>NEU Library Admin - Visit Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#1152d4",
                        "on-primary-container": "#1e40af",
                        "surface-variant": "#f1f5f9",
                        "primary": "#1152d4",
                        "error-container": "#fee2e2",
                        "secondary": "#475569",
                        "tertiary": "#0f172a",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#d9dae3",
                        "on-surface": "#0f172a",
                        "surface-container-low": "#f0f1f5",
                        "error": "#ef4444",
                        "outline": "#cbd5e1",
                        "on-tertiary-container": "#f8fafc",
                        "secondary-fixed-dim": "#e2e8f0",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "on-secondary-fixed": "#0f172a",
                        "primary-fixed-dim": "#bfdbfe",
                        "inverse-on-surface": "#f1f5f9",
                        "on-secondary-container": "#1e293b",
                        "outline-variant": "#e2e8f0",
                        "on-tertiary-fixed-variant": "#1e293b",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e1e2e9",
                        "on-primary-fixed": "#1e3a8a",
                        "inverse-primary": "#93c5fd",
                        "on-primary": "#ffffff",
                        "on-error-container": "#991b1b",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e2e8f0",
                        "surface-container": "#e8e9ef",
                        "surface-bright": "#ffffff",
                        "on-tertiary-fixed": "#020617",
                        "on-secondary-fixed-variant": "#334155",
                        "background": "#f6f6f8",
                        "on-background": "#0f172a",
                        "surface-dim": "#d9d9e4",
                        "tertiary-fixed-dim": "#cbd5e1",
                        "tertiary-container": "#334155",
                        "on-surface-variant": "#475569",
                        "inverse-surface": "#1e293b",
                        "secondary-container": "#f1f5f9",
                        "primary-fixed": "#dbeafe",
                        "primary-container": "#dbeafe",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f6f6f8",
                        "secondary-fixed": "#f1f5f9"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .type-badge {
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .type-student { background-color: #dbeafe; color: #1e40af; }
        .type-employee { background-color: #e2e8f0; color: #334155; }
    </style>
</head>
<body class="bg-background text-on-surface flex min-h-screen">
    <aside class="w-64 bg-surface-container-lowest border-r border-outline-variant flex flex-col fixed h-full z-20">
        <div class="p-4 flex flex-col gap-1 border-b border-outline-variant">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-xl">school</span>
                </div>
                <div>
                    <h1 class="text-xs font-bold text-on-surface leading-tight">NEU Library Admin</h1>
                </div>
            </div>
        </div>
        <nav class="px-2 pt-4 pb-2 space-y-1">
            <a onclick="location.href='adashboard.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">dashboard</span>
                <span class="text-xs font-medium">Dashboard Overview</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary transition-colors cursor-default" href="#">
                <span class="material-symbols-outlined text-xl">list_alt</span>
                <span class="text-xs font-bold">Detailed Visit Logs</span>
            </a>
            <a onclick="location.href='adminlogs.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">admin_panel_settings</span>
                <span class="text-xs font-medium">Admin Logs</span>
            </a>
        </nav>
        
        <div class="flex-1"></div>
        <div class="px-4 py-2 border-t border-outline-variant">
            <a onclick="location.href='admin.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-error hover:bg-error-container transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">logout</span>
                <span class="text-xs font-medium">Logout</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 ml-64 flex flex-col">
        <header class="h-16 bg-surface-bright border-b border-outline-variant px-8 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold text-on-surface uppercase tracking-tight">Detailed Visitor Logs</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-semibold text-on-surface">Admin</span>
                </div>
                <div class="bg-primary/10 rounded-full size-10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary">account_circle</span>
                </div>
            </div>
        </header>

        <div class="p-8 space-y-6">
            
            <div class="bg-surface-container-lowest border border-outline-variant p-4 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4 bg-surface-container-low border border-outline-variant px-4 py-3 rounded-xl">
                    <span class="material-symbols-outlined text-on-surface-variant">search</span>
                    <input id="searchInput" class="bg-transparent border-none text-sm w-full focus:ring-0 placeholder:text-on-surface-variant/60 outline-none" placeholder="Search by ID, Name, Type, College, Purpose of Visit, Date, or Time..." type="text">
                </div>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl overflow-hidden shadow-sm">
                <div class="px-6 py-4 border-b border-outline-variant flex justify-between items-center bg-surface-bright">
                    <h3 class="font-bold text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">history</span>
                        Real-time Visitor Activity
                    </h3>
                    <button onclick="exportToCSV()" class="text-xs font-bold text-primary flex items-center gap-1 hover:underline">
                        <span class="material-symbols-outlined text-sm">download</span> Export List
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container-low border-b border-outline-variant">
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">ID</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Type</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Name</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Email Address</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">College</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Purpose</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Login Date & Time</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="visitorTableBody" class="divide-y divide-outline-variant/30 bg-surface-container-lowest">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

<script>
    const EMPLOYEE_API_URL = 'http://localhost:8080/api/employee-visits';
    const STUDENT_API_URL = 'http://localhost:8080/api/visits'; 
    let allVisitsData = []; 

    document.addEventListener('DOMContentLoaded', () => {
        fetchVisits();
        setInterval(fetchVisits, 10000); 

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterTable(e.target.value.toLowerCase().trim());
        });
    });

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const [hours, minutes] = timeStr.split(':');
        let h = parseInt(hours);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${minutes} ${ampm}`;
    }

    async function fetchVisits() {
        try {
            const [employeeRes, studentRes] = await Promise.all([
                fetch(EMPLOYEE_API_URL).catch(() => null),
                fetch(STUDENT_API_URL).catch(() => null)
            ]);

            let employeeData = [];
            let studentData = [];

            if (employeeRes && employeeRes.ok) employeeData = await employeeRes.json();
            if (studentRes && studentRes.ok) studentData = await studentRes.json();

            const normalizedEmployees = employeeData.map(v => ({
                id: v.employeeId || '',
                type: 'Employee',
                name: v.fullName || '',
                email: v.email || '',
                college: v.department || '', 
                purpose: v.purpose || '',
                visitDate: v.visitDate || '',
                visitTime: v.visitTime || ''
            }));

            const normalizedStudents = studentData.map(v => ({
                id: v.studentId || '',
                type: 'Student',
                name: v.fullName || '',
                email: v.email || '',
                college: v.program || '', 
                purpose: v.purpose || '',
                visitDate: v.visitDate || '',
                visitTime: v.visitTime || ''
            }));

            allVisitsData = [...normalizedEmployees, ...normalizedStudents];
            
            allVisitsData.sort((a, b) => {
                const dateStrA = `${a.visitDate || ''}T${a.visitTime || '00:00:00'}`;
                const dateStrB = `${b.visitDate || ''}T${b.visitTime || '00:00:00'}`;
                const timeA = new Date(dateStrA).getTime();
                const timeB = new Date(dateStrB).getTime();
                if (isNaN(timeA)) return 1;
                if (isNaN(timeB)) return -1;
                return timeB - timeA;
            });

            const currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
            if (currentSearch) {
                filterTable(currentSearch);
            } else {
                renderTable(allVisitsData);
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            document.getElementById('visitorTableBody').innerHTML = `
                <tr><td colspan="8" class="px-6 py-10 text-center text-error">Backend servers not reachable.</td></tr>`;
        }
    }

    function renderTable(dataArray) {
        const tbody = document.getElementById('visitorTableBody');
        tbody.innerHTML = ''; 

        if (dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-5 text-center text-sm text-on-surface-variant">No results found.</td></tr>`;
            return;
        }

        let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];

        dataArray.forEach(visit => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-surface-container-low/50 transition-colors border-b border-outline-variant/30';
            
            const formattedTime = formatTime(visit.visitTime);
            const formattedDate = visit.visitDate || 'N/A';
            const badgeClass = visit.type === 'Student' ? 'type-student' : 'type-employee';

            const isBlocked = visit.email && blockedEmails.includes(visit.email.toLowerCase());

            let actionButtonHtml = '';
            if (isBlocked) {
                actionButtonHtml = `
                    <button onclick="unblockUser('${visit.id}', '${visit.type}', '${visit.email}')" class="px-3 py-1.5 bg-green-100 text-green-700 rounded-md hover:bg-green-600 hover:text-white transition-colors flex items-center gap-1 text-xs font-bold border border-green-200 hover:border-green-600">
                        <span class="material-symbols-outlined text-[16px]">check_circle</span> Unblock
                    </button>
                `;
            } else {
                actionButtonHtml = `
                    <button onclick="blockUser('${visit.id}', '${visit.type}', '${visit.email}')" class="px-3 py-1.5 bg-error/10 text-error rounded-md hover:bg-error hover:text-on-error transition-colors flex items-center gap-1 text-xs font-bold border border-error/20 hover:border-error">
                        <span class="material-symbols-outlined text-[16px]">block</span> Block
                    </button>
                `;
            }

            row.innerHTML = `
                <td class="px-6 py-5 text-sm font-bold text-secondary">${visit.id}</td>
                <td class="px-6 py-5"><span class="type-badge ${badgeClass}">${visit.type}</span></td>
                <td class="px-6 py-5"><span class="text-sm font-bold text-on-surface">${visit.name}</span></td>
                <td class="px-6 py-5 text-sm text-on-surface-variant">${visit.email}</td>
                <td class="px-6 py-5 text-sm font-medium text-on-surface-variant">${visit.college}</td>
                <td class="px-6 py-5 text-sm text-on-surface-variant">${visit.purpose}</td>
                <td class="px-6 py-5 text-sm font-medium text-on-surface">${formattedDate} · ${formattedTime}</td>
                <td class="px-6 py-5 text-sm font-medium flex justify-center">
                    ${actionButtonHtml}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function blockUser(id, type, email) {
        if(confirm(`Are you sure you want to block the ${type} with ID: ${id} (${email})?`)) {
            const blockEndpoint = type === 'Employee' 
                ? `http://localhost:8080/api/employees/${id}/block`
                : `http://localhost:8080/api/students/${id}/block`; 

            fetch(blockEndpoint, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];
                if (email && !blockedEmails.includes(email.toLowerCase())) {
                    blockedEmails.push(email.toLowerCase());
                    localStorage.setItem('blockedEmails', JSON.stringify(blockedEmails));
                }

                if(response.ok) {
                    alert(`${type} ID ${id} has been blocked successfully.`);
                } else {
                    alert(`Local block applied for ${email}. (Note: Backend returned status ${response.status})`);
                }
                fetchVisits(); 
            })
            .catch(error => {
                console.error(`Error blocking ${type.toLowerCase()}:`, error);
                let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];
                if (email && !blockedEmails.includes(email.toLowerCase())) {
                    blockedEmails.push(email.toLowerCase());
                    localStorage.setItem('blockedEmails', JSON.stringify(blockedEmails));
                }
                alert(`Local block applied for ${email} (Backend offline).`);
                fetchVisits(); 
            });
        }
    }

    function unblockUser(id, type, email) {
        if(confirm(`Are you sure you want to UNBLOCK the ${type} with ID: ${id} (${email})?`)) {
            const unblockEndpoint = type === 'Employee' 
                ? `http://localhost:8080/api/employees/${id}/unblock`
                : `http://localhost:8080/api/students/${id}/unblock`; 

            fetch(unblockEndpoint, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];
                if (email) {
                    blockedEmails = blockedEmails.filter(e => e !== email.toLowerCase());
                    localStorage.setItem('blockedEmails', JSON.stringify(blockedEmails));
                }

                if(response.ok) {
                    alert(`${type} ID ${id} has been unblocked successfully.`);
                } else {
                    alert(`Local unblock applied for ${email}. (Note: Backend returned status ${response.status})`);
                }
                fetchVisits(); 
            })
            .catch(error => {
                console.error(`Error unblocking ${type.toLowerCase()}:`, error);
                let blockedEmails = JSON.parse(localStorage.getItem('blockedEmails')) || [];
                if (email) {
                    blockedEmails = blockedEmails.filter(e => e !== email.toLowerCase());
                    localStorage.setItem('blockedEmails', JSON.stringify(blockedEmails));
                }
                alert(`Local unblock applied for ${email} (Backend offline).`);
                fetchVisits(); 
            });
        }
    }

    function filterTable(searchTerm) {
        if (!searchTerm) {
            renderTable(allVisitsData);
            return;
        }
        const filteredData = allVisitsData.filter(visit => {
            return (
                (visit.id && visit.id.toString().toLowerCase().includes(searchTerm)) ||
                (visit.type && visit.type.toLowerCase().includes(searchTerm)) ||
                (visit.name && visit.name.toLowerCase().includes(searchTerm)) ||
                (visit.email && visit.email.toLowerCase().includes(searchTerm)) ||
                (visit.college && visit.college.toLowerCase().includes(searchTerm)) ||
                (visit.purpose && visit.purpose.toLowerCase().includes(searchTerm)) ||
                (visit.visitDate && visit.visitDate.toLowerCase().includes(searchTerm)) ||
                (visit.visitTime && visit.visitTime.toLowerCase().includes(searchTerm))
            );
        });
        renderTable(filteredData);
    }

    function exportToCSV() {
        let csv = [];
        let headers = ["ID", "Type", "Name", "Email Address", "College", "Purpose", "Login Date & Time"];
        csv.push(headers.join(","));

        let rows = document.querySelectorAll("#visitorTableBody tr");
        
        rows.forEach(row => {
            let cols = row.querySelectorAll("td");
            if (cols.length > 1) { 
                let rowData = [];
                for (let i = 0; i < cols.length - 1; i++) {
                    let data = cols[i].innerText.replace(/(\r\n|\n|\r)/gm, "").trim();
                    rowData.push('"' + data + '"');
                }
                csv.push(rowData.join(","));
            }
        });

        downloadCSV(csv.join("\n"), "library_visit_logs.csv");
    }

    function downloadCSV(csv, filename) {
        let csvFile = new Blob([csv], {type: "text/csv"});
        let downloadLink = document.createElement("a");
        downloadLink.download = filename;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
</script>
</body>
</html>
