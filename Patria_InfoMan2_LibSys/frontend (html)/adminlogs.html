                        "error-container": "#fee2e2",
                        "secondary": "#475569",
                        "tertiary": "#0f172a",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#d9dae3",
                        "on-surface": "#0f172a",
                        "surface-container-low": "#f0f1f5",
                        "error": "#ef4444",
                        "outline": "#cbd5e1",
                        "on-tertiary-container": "#f8fafc",
                        "secondary-fixed-dim": "#e2e8f0",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "on-secondary-fixed": "#0f172a",
                        "primary-fixed-dim": "#bfdbfe",
                        "inverse-on-surface": "#f1f5f9",
                        "on-secondary-container": "#1e293b",
                        "outline-variant": "#e2e8f0",
                        "on-tertiary-fixed-variant": "#1e293b",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e1e2e9",
                        "on-primary-fixed": "#1e3a8a",
                        "inverse-primary": "#93c5fd",
                        "on-primary": "#ffffff",
                        "on-error-container": "#991b1b",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e2e8f0",
                        "surface-container": "#e8e9ef",
                        "surface-bright": "#ffffff",
                        "on-tertiary-fixed": "#020617",
                        "on-secondary-fixed-variant": "#334155",
                        "background": "#f6f6f8",
                        "on-background": "#0f172a",
                        "surface-dim": "#d9d9e4",
                        "tertiary-fixed-dim": "#cbd5e1",
                        "tertiary-container": "#334155",
                        "on-surface-variant": "#475569",
                        "inverse-surface": "#1e293b",
                        "secondary-container": "#f1f5f9",
                        "primary-fixed": "#dbeafe",
                        "primary-container": "#dbeafe",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f6f6f8",

                        "label": ["Inter"]

            },
        }

    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface flex min-h-screen">
    <aside class="w-64 bg-surface-container-lowest border-r border-outline-variant flex flex-col fixed h-full z-20">
        <div class="p-4 flex flex-col gap-1 border-b border-outline-variant">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-xl">school</span>
                </div>
                <div>
                    <h1 class="text-xs font-bold text-on-surface leading-tight">NEU Library Admin</h1>
                </div>
            </div>
        </div>
        <nav class="px-2 pt-4 pb-2 space-y-1">
            <a onclick="location.href='adashboard.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">dashboard</span>
                <span class="text-xs font-medium">Dashboard Overview</span>
            </a>
            <a onclick="location.href='visitlogs.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">list_alt</span>
                <span class="text-xs font-medium">Detailed Visit Logs</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary transition-colors cursor-default" href="#">
                <span class="material-symbols-outlined text-xl">admin_panel_settings</span>
                <span class="text-xs font-bold">Admin Logs</span>
            </a>
        </nav>
        
        <div class="flex-1"></div>
        <div class="px-4 py-2 border-t border-outline-variant">
            <a onclick="location.href='admin.html'" class="flex items-center gap-3 px-3 py-2 rounded-lg text-error hover:bg-error-container transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-xl">logout</span>
                <span class="text-xs font-medium">Logout</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 ml-64 flex flex-col">
        <header class="h-16 bg-surface-bright border-b border-outline-variant px-8 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold text-on-surface uppercase tracking-tight">Admin Access Logs</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-semibold text-on-surface">Admin</span>
                </div>
                <div class="bg-primary/10 rounded-full size-10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary">account_circle</span>
                </div>
            </div>
        </header>

        <div class="p-8 space-y-6">
            
            <div class="bg-surface-container-lowest border border-outline-variant p-4 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4 bg-surface-container-low border border-outline-variant px-4 py-3 rounded-xl">
                    <span class="material-symbols-outlined text-on-surface-variant">search</span>
                    <input id="searchInput" class="bg-transparent border-none text-sm w-full focus:ring-0 placeholder:text-on-surface-variant/60 outline-none" placeholder="Search by Admin Name, Email, or Date..." type="text">
                </div>
            </div>

            <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl overflow-hidden shadow-sm">
                <div class="px-6 py-4 border-b border-outline-variant flex justify-between items-center bg-surface-bright">
                    <h3 class="font-bold text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">security</span>
                        Google Authentication Activity
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container-low border-b border-outline-variant">
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Admin Name</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Email Address</th>
                                <th class="px-6 py-4 text-xs font-black text-on-surface-variant uppercase tracking-widest">Login Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="adminLogsBody" class="divide-y divide-outline-variant/30 bg-surface-container-lowest">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

<script>
    const ADMIN_API_URL = 'http://localhost:8080/api/admin-logs';
    let adminLogsData = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadAdminLogs();
        
        setInterval(loadAdminLogs, 10000); 

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterTable(e.target.value.toLowerCase().trim());
        });
    });

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const [hours, minutes] = timeStr.split(':');
        let h = parseInt(hours);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${minutes} ${ampm}`;
    }

    async function loadAdminLogs() {
        try {
            const response = await fetch(ADMIN_API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            let logs = await response.json();
            
            logs = logs.map(log => ({
                name: log.name,
                email: log.email,
                date: log.loginDate, 
                time: log.loginTime  
            }));

            logs.sort((a, b) => {
                const dateA = new Date(`${a.date}T${a.time}`).getTime();
                const dateB = new Date(`${b.date}T${b.time}`).getTime();
                
                if (isNaN(dateA)) return 1;
                if (isNaN(dateB)) return -1;
                
                return dateB - dateA;
            });

            adminLogsData = logs;

            const currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
            if (currentSearch) {
                filterTable(currentSearch);
            } else {
                renderTable(adminLogsData);
            }
        } catch (error) {
            console.error('Error fetching admin logs:', error);
            document.getElementById('adminLogsBody').innerHTML = `
                <tr><td colspan="3" class="px-6 py-5 text-center text-sm text-error">Failed to load admin logs from database.</td></tr>`;
        }
    }

    function renderTable(dataArray) {
        const tbody = document.getElementById('adminLogsBody');
        tbody.innerHTML = ''; 

        if (dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-5 text-center text-sm text-on-surface-variant">No admin activity logs found.</td></tr>`;
            return;
        }

        dataArray.forEach(log => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-surface-container-low/50 transition-colors border-b border-outline-variant/30';
            
            const formattedTime = formatTime(log.time);
            
            row.innerHTML = `
                <td class="px-6 py-5"><span class="text-sm font-bold text-on-surface">${log.name}</span></td>
                <td class="px-6 py-5 text-sm text-on-surface-variant">${log.email}</td>
                <td class="px-6 py-5 text-sm font-medium text-on-surface">${log.date} · ${formattedTime}</td>
            `;
            tbody.appendChild(row);
        });
    }

    function filterTable(searchTerm) {
        if (!searchTerm) {
            renderTable(adminLogsData);
            return;
        }
        const filteredData = adminLogsData.filter(log => {
            return (
                (log.name && log.name.toLowerCase().includes(searchTerm)) ||
                (log.email && log.email.toLowerCase().includes(searchTerm)) ||
                (log.date && log.date.toLowerCase().includes(searchTerm)) ||
                (log.time && log.time.toLowerCase().includes(searchTerm))
            );
        });
        renderTable(filteredData);
    }
</script>
</body>
</html>
