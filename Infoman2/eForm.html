<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NEU Library - Employee Information Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5c5c",
                        "background-light": "#edf2f2",
                        "background-dark": "#0f1818",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-color: #2a5c5c;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900 shadow-sm">
<div class="flex items-center gap-3 text-primary">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined" >menu_book</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight" >NEU Library</h2>
</div>
<div class="flex flex-1 justify-end gap-8 items-center">
<div class="hidden md:flex items-center gap-9">
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="index.html" >Home</a>
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#" >Services</a>
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#" >Contact</a>
</div>
<div class="bg-primary/10 rounded-full size-10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
</header>
<main class="flex-1 flex justify-center py-10 px-4">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 p-8">
<div class="flex flex-col gap-2 mb-8 border-b border-slate-100 dark:border-slate-800 pb-6">
<div class="flex items-center gap-2 text-primary mb-1">
<span class="text-xs font-bold uppercase tracking-wider bg-primary/10 px-2 py-1 rounded" >Step 2 of 2</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight" >Employee Information Form</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm" >Please provide your details and purpose of visit to continue.</p>
</div>
<form class="flex flex-col gap-6" onsubmit="saveData(); return false;">
<div class="flex flex-col gap-1.5">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >Email Address</label>
<input id="empemail" required class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="firstname.lastname@neu.edu.ph" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >Full Name</label>
<input id="empfullname" required class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Juan Dela Cruz" type="text"/>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >Employee ID Number</label>
<input id="employeeid" required class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="xx-xxxxx-xxx" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >College Department</label>
<input id="department" required class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="e.g. CICS" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >Role</label>
<input id="role" required class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Faculty Professor" type="text"/>
</div>
<div class="flex flex-col gap-3">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold" >Purpose of Visit</label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
<label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-primary/5 cursor-pointer transition-colors group" >
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="purpose" value="Reading" type="radio" required/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300" >Reading</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-primary/5 cursor-pointer transition-colors group" >
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="purpose" value="Research" type="radio" required/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300" >For research</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-primary/5 cursor-pointer transition-colors group" >
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="purpose" value="Computer Use" type="radio" required/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300" >Use of computer</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-primary/5 cursor-pointer transition-colors group" >
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="purpose" value="Assignments" type="radio" required/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300" >Assignments</span>
</label>
</div>
<div class="flex flex-col gap-3 mt-1">
<label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-primary/5 cursor-pointer transition-colors" >
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="purpose" value="Other" type="radio" required/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300" >Other</span>
</label>
<textarea id="otherPurpose" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 h-24 resize-none" placeholder="Please specify your purpose..."></textarea>
</div>
</div>
<div class="flex items-center gap-4 mt-4">
<button onclick="location.href='employee.html'" class="flex-1 px-6 py-3 rounded-lg border border-slate-300 dark:border-slate-600 font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" type="button">
                            Back
                        </button>
<button class="flex-[2] px-6 py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20" type="submit">
                            Enter
                        </button>
</div>
</form>
</div>
</main>
</div>
</div>

<script>
    function saveData() {
        // Retrieve values from inputs and trim whitespace
        let email = document.getElementById("empemail").value.trim();
        let fullName = document.getElementById("empfullname").value.trim();
        let employeeId = document.getElementById("employeeid").value.trim();
        let department = document.getElementById("department").value.trim();
        let role = document.getElementById("role").value.trim();

        // Retrieve selected radio button for purpose
        let purpose = document.querySelector('input[name="purpose"]:checked')?.value;

        // If "Other" is selected, grab and validate the text from the textarea
        if (purpose === "Other") {
            let otherText = document.getElementById("otherPurpose").value.trim();
            if (otherText === "") {
                alert("Please specify your purpose in the text box provided.");
                return; 
            }
            purpose = otherText;
        }

        // 1. Package the data into a JSON object for the Employee endpoint
        let employeeVisitData = {
            email: email,
            fullName: fullName,
            employeeId: employeeId,
            department: department,
            role: role,
            purpose: purpose
        };

        // 2. Send the data to your Spring Boot API
        // Note: Ensure your Controller has a @PostMapping for "/api/employee-visits"
        fetch('http://localhost:8080/api/employee-visits', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(employeeVisitData)
        })
        .then(response => {
            if (response.ok) {
                // Save to localStorage for the Welcome page display
                localStorage.setItem("empfullname", fullName);
                localStorage.setItem("employeeid", employeeId);
                localStorage.setItem("department", department);
                localStorage.setItem("role", role);

                // Redirect to the success/welcome screen
                window.location.href = "eWelcome.html"; 
            } else {
                alert("Error saving data to the database. Status: " + response.status);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Could not connect to the server. Please ensure the backend is running.");
        });
    }
</script>

</body></html>
