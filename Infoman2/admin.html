<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Corporate Admin Login - NEU Library</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0A3F6B",
                        "background-light": "#E8F0F7",
                        "background-dark": "#041A2D",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            
            <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900">
                <div class="flex items-center gap-4">
                    <div class="text-primary size-8">
                        <svg fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.7 57355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill-rule="evenodd"></path>
                        </svg>
                    </div>
                    <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">NEU Library</h2>
                </div>
                <div class="flex items-center gap-8">
                    <nav class="hidden md:flex items-center gap-9">
                        <a onclick="location.href='index.html'" class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="index.html">Home</a>
                        <a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Services</a>
                        <a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Contact</a>
                    </nav>
                    <div class="bg-primary/10 rounded-full size-10 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary">account_circle</span>
                    </div>
                </div>
            </header>

            <main class="flex flex-1 justify-center py-10 px-4">
                <div class="layout-content-container flex flex-col max-w-[520px] flex-1">
                    <div class="@container mb-8">
                        <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[240px] shadow-lg border border-slate-200 dark:border-slate-800" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD_6bt_rLlgotQ9_5ys519FcfFfZ1oaW13ObW1Xy5sj2sGibmNcb2nyIlpLmMdjXMEP6eQfqLInyurrDmAouPvxSnzkP-b511B9IHJSgDJgYLTO2MKmO1-SfrW4NBAv_sf-82-USZXul_MtclXkCJUWuLhIHcJ-pR8VZQCbW8VGcuTirqkkFzpOzE82ZQaVYNlc-I1GFftlcNlSrIb3MB3rO-AP41Xa2o7LyDze4yjf_4InHTaK6Io7wFks4ii1JytE_zoOQiJCjgo");'>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-3 mb-8 px-2 text-center">
                        <h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight">Admin Login</h1>
                        <p class="text-slate-600 dark:text-slate-400 text-base font-normal">Welcome, Administrator. Please enter your credentials to manage library resources.</p>
                    </div>

                    <form class="flex flex-col gap-4" onsubmit="event.preventDefault(); adminLogin();">
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="username">Username</label>
                            <input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 focus:border-primary focus:ring-primary/20 transition-all text-slate-900 dark:text-white" id="username" placeholder="Enter username" type="text" required/>
                        </div>
                        
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
                            <input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 focus:border-primary focus:ring-primary/20 transition-all text-slate-900 dark:text-white" id="password" placeholder="Enter password" type="password" required/>
                        </div>
                        
                        <button class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:opacity-90 transition-all shadow-md mt-2" type="submit">
                            Login
                        </button>
                    </form>

                    <div class="mt-12 text-center">
                        <p class="text-slate-500 dark:text-slate-400 text-sm">
                            Forgot Password? 
                            <a class="text-primary font-semibold hover:underline" href="#">Contact IT Support.</a>
                        </p>
                        <div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 flex justify-center gap-6">
                            <img alt="NEU Logo" class="opacity-50 grayscale hover:grayscale-0 transition-all h-8" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDURS3hNpFNSOqGrymVxw_9EJ5FUwUP6Q-bhrWwhMKI7mKhkewVUcRxITdeZMiFo4mSuGRx31UhJ-Ln4xV4wjOnfz5JaSntlOIvaDzcDnivN56Nyh31d5hbyYqL3FDyHKxHii8NyINhkZpOQUQbI1bWmjskV1yA1tS2-EeGselFEsH64smANCJhfSno1QZQDjo2v494ejgoQhCZQbmnDMdXijbrJQvSVoPS4u0QT3qil33oNvVnsMPAoSY3CpiwDCXljZEoD-4wqXA"/>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminLogin() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin" && pass === "admin123") {
                location.href = "adashboard.html";
            } else {
                alert("Invalid login.");
            }
        }
    </script>
</body>
</html>
