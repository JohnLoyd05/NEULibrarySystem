<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NEU Library - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script id="tailwind-config">
tailwind.config = {
darkMode: "class",
theme: {
extend: {
colors: {
"primary": "#2a5c5c",
"background-light": "#edf2f2",
"background-dark": "#0f1818",
},
fontFamily: {
"display": ["Inter"]
},
borderRadius: {"DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px"},
},
},
}
</script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">

<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">

<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-10 py-3 sticky top-0 z-50">

<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">NEU Library</h2>
</div>

<div class="bg-primary/10 rounded-full size-10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>

</header>

<main class="flex-1 flex justify-center py-8 px-4 md:px-0">

<div class="layout-content-container flex flex-col max-w-[540px] flex-1 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">

<div class="flex flex-col items-center gap-6 p-8 md:p-12 text-center">

<div class="bg-primary/10 dark:bg-primary/20 p-4 rounded-full">
<span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
</div>

<div class="flex flex-col gap-3">

<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-tight">
Welcome, <span id="employeeName"></span>!
</h1>

<p class="text-slate-500 dark:text-slate-400 text-lg">
Happy visiting at the NEU Library!
</p>

</div>

<div class="w-full aspect-video rounded-xl bg-slate-100 dark:bg-slate-800 bg-center bg-no-repeat bg-cover border border-slate-200 dark:border-slate-700 shadow-inner"
style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDnPcC54sfzyWQRf-DHhjvF9CsKC3L1m6mwB-ZuII-Zn_DVxFYMkQFBsAJfbLwZ290i4NbU31YqyRhv156RCh6kM0bGMEYoodeFCnr0_rfg2qXZwjnhI0xlCt583ko4ft5uhQv76wcxX_ba_C6YjUzYXJ8IShKcfCB2HJrH-IVXpU1z-cCw9LiQ3TbtDSyKQaLL33rls8cB28l4Gb1MIouBYidWySXbmB236FSqPF0eQik8Sue2abZcvVPYVIvwM5Ep2yiNJOleFAA');">
</div>

</div>

<div class="px-8 pb-4">

<h3 class="text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">
Session Details
</h3>

<div class="grid grid-cols-1 gap-1">

<div class="flex items-center justify-between py-4 border-t border-slate-100 dark:border-slate-800">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Employee ID</span>
<span id="employeeID" class="text-slate-900 dark:text-slate-100 text-sm font-semibold"></span>
</div>

<div class="flex items-center justify-between py-4 border-t border-slate-100 dark:border-slate-800">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Date</span>
<span id="visitDate" class="text-slate-900 dark:text-slate-100 text-sm font-semibold"></span>
</div>

<div class="flex items-center justify-between py-4 border-t border-slate-100 dark:border-slate-800">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Time</span>
<span id="visitTime" class="text-slate-900 dark:text-slate-100 text-sm font-semibold"></span>
</div>

<div class="flex items-center justify-between py-4 border-t border-slate-100 dark:border-slate-800">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">College Department</span>
<span id="department" class="text-slate-900 dark:text-slate-100 text-sm font-semibold"></span>
</div>

</div>
</div>

<div class="p-8 flex flex-col gap-3 bg-slate-50 dark:bg-slate-800/50">

<button class="flex items-center justify-center gap-2 w-full h-12 rounded-lg bg-primary text-white text-base font-bold hover:bg-primary/90 shadow-lg shadow-primary/20">
<span class="truncate">Access Digital Resources</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>

<button class="flex items-center justify-center w-full h-12 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-600 text-base font-bold">
<span onclick="location.href='index.html'" class="truncate">Go back to Homepage</span>
</button>

</div>

</div>

</main>

</div>
</div>

<script>

const empname = localStorage.getItem("empfullname");
const empid = localStorage.getItem("employeeid");
const department = localStorage.getItem("department");

if(empname){
document.getElementById("employeeName").innerText = empname;
}

if(empid){
document.getElementById("employeeID").innerText = empid;
}

if(department){
document.getElementById("department").innerText = department;
}

const now = new Date();

document.getElementById("visitDate").innerText =
now.toLocaleDateString();

document.getElementById("visitTime").innerText =
now.toLocaleTimeString();

</script>

</body>
</html>
